name: Deploy on Push to Main

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          envs: MONGODB_URI,NEXT_PUBLIC_API_URL
          script: |
            # Write envs in case they're missing on server
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > /root/.openclaw/workspace-leads/agent-office/backend/.env
            echo "MONGODB_DB=agent_office" >> /root/.openclaw/workspace-leads/agent-office/backend/.env
            echo "NEXT_PUBLIC_API_URL=http://${{ secrets.DEPLOY_HOST }}:4000" > /root/.openclaw/workspace-leads/agent-office/frontend/.env.local

            bash /root/.openclaw/workspace-leads/agent-office/scripts/deploy.sh
